<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aegis.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>EU AI Act Compliance Tool</title>

    <!-- Theme initialization BEFORE React loads to prevent FOUC -->
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("theme");
          const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && systemDark)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {
          console.error("Theme init error:", e);
        }
      })();
    </script>
  </head>

  <body class="m-0 bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
